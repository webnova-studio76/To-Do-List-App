<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebNova Task Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #5d5bf0;
            --bg: #f4f7fe;
            --card: #ffffff;
            --text: #1e293b;
            --border: #e2e8f0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }

        body { 
            background: var(--bg); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            padding: 20px;
        }

        .todo-app {
            background: var(--card);
            width: 100%;
            max-width: 400px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .header {
            background: var(--primary);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        .header h1 { font-size: 24px; margin-bottom: 20px; }

        .input-wrapper {
            display: flex;
            background: white;
            padding: 5px;
            border-radius: 12px;
        }

        input {
            flex: 1;
            border: none;
            padding: 12px;
            outline: none;
            font-size: 15px;
            color: var(--text);
        }

        .add-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
        }

        .list-container {
            padding: 20px;
            max-height: 400px;
            overflow-y: auto;
        }

        .task-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--bg);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .task-text {
            flex: 1;
            cursor: pointer;
            font-size: 15px;
            color: var(--text);
        }

        .done .task-text {
            text-decoration: line-through;
            opacity: 0.5;
        }

        .delete-btn {
            color: #ff5e5e;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            margin-left: 10px;
        }

        .footer {
            text-align: center;
            padding: 20px;
            font-size: 12px;
            color: #94a3b8;
            border-top: 1px solid var(--border);
        }
    </style>
</head>
<body>

<div class="todo-app">
    <div class="header">
        <h1>My Tasks</h1>
        <div class="input-wrapper">
            <input type="text" id="userInput" placeholder="Add a new task...">
            <button class="add-btn" onclick="addNewTask()">ADD</button>
        </div>
    </div>

    <div class="list-container" id="taskList">
        </div>

    <div class="footer">
        Keep learning, keep building! 🚀<br>
        <strong>WebNova Studio</strong>
    </div>
</div>

<script>
    const inputField = document.getElementById('userInput');
    const listDiv = document.getElementById('taskList');

    // 1. Load data from memory
    let tasks = JSON.parse(localStorage.getItem('simpleTasks')) || [];

    // 2. Display the tasks
    function renderTasks() {
        listDiv.innerHTML = ''; // Clear current list
        
        tasks.forEach((task, index) => {
            const item = document.createElement('div');
            item.className = `task-item ${task.completed ? 'done' : ''}`;
            
            item.innerHTML = `
                <span class="task-text" onclick="toggleTask(${index})">${task.text}</span>
                <button class="delete-btn" onclick="deleteTask(${index})">🗑️</button>
            `;
            
            listDiv.appendChild(item);
        });

        // Save to local storage
        localStorage.setItem('simpleTasks', JSON.stringify(tasks));
    }

    // 3. Logic to Add Task
    function addNewTask() {
        const value = inputField.value.trim();
        
        if (value !== "") {
            tasks.push({ text: value, completed: false });
            inputField.value = ""; // Clear input
            renderTasks();
        } else {
            alert("Please type something first!");
        }
    }

    // 4. Logic to Toggle (Complete)
    function toggleTask(index) {
        tasks[index].completed = !tasks[index].completed;
        renderTasks();
    }

    // 5. Logic to Delete
    function deleteTask(index) {
        tasks.splice(index, 1);
        renderTasks();
    }

    // 6. Listen for 'Enter' key
    inputField.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            addNewTask();
        }
    });

    // Initial load
    renderTasks();
</script>

</body>
</html>
